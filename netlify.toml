[build]
  publish = "public"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/check"
  to = "/.netlify/functions/check"
  status = 200

[[redirects]]
  from = "/api/vehicle-image"
  to = "/.netlify/functions/vehicle-image"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
